<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sugar Cube Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ec2e91;
    --lime: #C3d81e;
    --black: #090405;
    --dark-gray: #1a1218;
    --white: #f5f0e8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem;
  }

  .admin-card {
    background: var(--dark-gray);
    border: 2px solid var(--pink);
    width: 100%;
    max-width: 480px;
    padding: 2.5rem 2rem;
    position: relative;
  }

  .admin-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 40px 40px 0;
    border-color: transparent var(--lime) transparent transparent;
  }

  .admin-logo {
    font-family: 'Bangers', cursive;
    font-size: 1.6rem;
    letter-spacing: 0.1em;
    color: var(--pink);
    margin-bottom: 0.25rem;
  }

  .admin-logo span { color: var(--lime); }

  .admin-subtitle {
    font-family: 'Special Elite', cursive;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: rgba(245,240,232,0.4);
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  .toggle-row {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 2rem;
  }

  .toggle-btn {
    flex: 1;
    font-family: 'Bangers', cursive;
    font-size: 1.2rem;
    letter-spacing: 0.1em;
    padding: 0.75rem;
    border: 2px solid rgba(255,255,255,0.1);
    background: transparent;
    color: rgba(245,240,232,0.3);
    cursor: pointer;
    transition: all 0.2s;
  }

  .toggle-btn.active-open {
    background: rgba(195,216,30,0.1);
    border-color: var(--lime);
    color: var(--lime);
  }

  .toggle-btn.active-closed {
    background: rgba(236,46,145,0.1);
    border-color: var(--pink);
    color: var(--pink);
  }

  .field {
    margin-bottom: 1.25rem;
  }

  .field label {
    display: block;
    font-family: 'Special Elite', cursive;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: rgba(245,240,232,0.5);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .field input,
  .field textarea {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus,
  .field textarea:focus {
    border-color: var(--pink);
  }

  .field textarea {
    resize: vertical;
    min-height: 80px;
  }

  .field .hint {
    font-size: 0.75rem;
    color: rgba(245,240,232,0.3);
    margin-top: 0.4rem;
    font-family: 'Special Elite', cursive;
    letter-spacing: 0.05em;
  }

  .submit-btn {
    width: 100%;
    font-family: 'Bangers', cursive;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    padding: 0.85rem;
    background: var(--pink);
    color: var(--black);
    border: none;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--lime);
    transition: transform 0.15s, box-shadow 0.15s;
    margin-top: 0.5rem;
  }

  .submit-btn:hover {
    transform: translate(-3px, -3px);
    box-shadow: 7px 7px 0 var(--lime);
  }

  .submit-btn:active {
    transform: translate(0, 0);
    box-shadow: 2px 2px 0 var(--lime);
  }

  .status-msg {
    margin-top: 1.25rem;
    font-family: 'Special Elite', cursive;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    text-align: center;
    min-height: 1.5rem;
    color: var(--lime);
  }

  .status-msg.error { color: var(--pink); }

  .divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.07);
    margin: 1.5rem 0;
  }

  .sheet-link {
    display: block;
    text-align: center;
    font-family: 'Special Elite', cursive;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    color: rgba(245,240,232,0.25);
    text-decoration: none;
    transition: color 0.2s;
  }

  .sheet-link:hover { color: var(--lime); }

  /* Disabled fields when closed */
  .fields-disabled input,
  .fields-disabled textarea {
    opacity: 0.3;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="admin-card">
  <div class="admin-logo">THE <span>SUGAR CUBE</span></div>
  <div class="admin-subtitle">Location Admin Panel</div>

  <div class="toggle-row">
    <button class="toggle-btn active-open" id="btnOpen" onclick="setStatus('open')">⚡ We're Open</button>
    <button class="toggle-btn" id="btnClosed" onclick="setStatus('closed')">✕ Closed Today</button>
  </div>

  <div id="openFields">
    <div class="field">
      <label>Current Address or Location</label>
      <input type="text" id="address" placeholder="e.g. 123 Main St, Leitchfield, KY">
      <div class="hint">Full address works best for the map pin. Cross-streets also work.</div>
    </div>

    <div class="field">
      <label>Message (optional)</label>
      <textarea id="message" placeholder="e.g. We're at the Farmers Market until 4pm!"></textarea>
      <div class="hint">Shows on the website under the map. Keep it short.</div>
    </div>
  </div>

  <button class="submit-btn" onclick="saveToSheet()">UPDATE LOCATION</button>

  <div class="status-msg" id="statusMsg"></div>

  <hr class="divider">
  <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1dDjkHUIWqGgsJKFA5VPrzO5xIOtUt4Bm4Pha3bRc0yA/edit" target="_blank">
    ↗ View live sheet data
  </a>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────────
  // Paste your Google Apps Script Web App URL here after setup
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzFvHNgbZ8TJaOxd7lglsr9-RkdVMJhjp8PoPmqeTpqohQPWi6V8RJYlBGkv0l-guVm/exec';
  // ────────────────────────────────────────────────────────────────────────────

  let currentStatus = 'open';

  function setStatus(s) {
    currentStatus = s;
    const btnOpen = document.getElementById('btnOpen');
    const btnClosed = document.getElementById('btnClosed');
    const fields = document.getElementById('openFields');

    if (s === 'open') {
      btnOpen.className = 'toggle-btn active-open';
      btnClosed.className = 'toggle-btn';
      fields.classList.remove('fields-disabled');
    } else {
      btnOpen.className = 'toggle-btn';
      btnClosed.className = 'toggle-btn active-closed';
      fields.classList.add('fields-disabled');
    }
  }

  async function saveToSheet() {
    const statusMsg = document.getElementById('statusMsg');
    const address = document.getElementById('address').value.trim();
    const message = document.getElementById('message').value.trim();

    if (currentStatus === 'open' && !address) {
      statusMsg.textContent = 'Enter an address before going live.';
      statusMsg.className = 'status-msg error';
      return;
    }

    statusMsg.textContent = 'Updating...';
    statusMsg.className = 'status-msg';

    const payload = {
      status: currentStatus,
      address: currentStatus === 'open' ? address : '',
      message: currentStatus === 'open' ? message : ''
    };

    try {
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      statusMsg.textContent = currentStatus === 'open'
        ? '✓ Location updated! Site will reflect in ~30 seconds.'
        : '✓ Marked as closed. Site updated.';
      statusMsg.className = 'status-msg';
    } catch (e) {
      statusMsg.textContent = 'Update failed. Check your connection and try again.';
      statusMsg.className = 'status-msg error';
    }
  }
</script>

</body>
</html>
